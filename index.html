<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔖 북마크</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:#fff;border-right:1px solid #e8e8e5;display:flex;flex-direction:column;padding:16px 10px}
.sidebar-logo{font-size:15px;font-weight:600;margin-bottom:16px;padding:0 6px;display:flex;align-items:center;gap:6px}
.cat-list{flex:1;overflow-y:auto}
.cat-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;color:#666;font-size:13px;transition:background 0.12s}
.cat-item:hover{background:#f0f0ec}
.cat-item.active{background:#f0f0ec;color:#1a1a1a;font-weight:500}
.cat-count{margin-left:auto;font-size:11px;color:#aaa;background:#f0f0ec;padding:1px 6px;border-radius:10px}
.cat-item.active .cat-count{background:#e0e0da}
.cat-divider{height:1px;background:#e8e8e5;margin:8px 4px}
.add-cat-area{padding-top:8px;border-top:1px solid #e8e8e5;margin-top:4px}
.add-cat-btn{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;cursor:pointer;color:#aaa;font-size:13px;transition:background 0.12s}
.add-cat-btn:hover{background:#f0f0ec;color:#666}
.cat-input-row{display:none;gap:6px;margin-top:6px}
.cat-input-row input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:8px;font-size:12px;outline:none;background:#f8f8f6}
.cat-input-row input:focus{border-color:#bbb}
.cat-input-row button{padding:6px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e8e8e5;padding:12px 18px;display:flex;align-items:center;gap:10px}
.search-box{flex:1;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 32px;border:1px solid #e0e0da;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-size:13px;outline:none;font-family:inherit}
.search-box input:focus{border-color:#bbb;background:#fff}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;font-size:14px;pointer-events:none}
.btn-new{display:flex;align-items:center;gap:5px;padding:8px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background 0.12s}
.btn-new:hover{background:#f0f0ec}
.filter-bar{padding:8px 18px;display:flex;gap:6px;border-bottom:1px solid #e8e8e5;background:#fff}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid #e0e0da;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.12s}
.filter-btn:hover,.filter-btn.on{background:#f0f0ec;border-color:#ccc;color:#1a1a1a}
.content{flex:1;overflow-y:auto;padding:18px}
.sec-label{font-size:12px;font-weight:500;color:#888;margin-bottom:10px;text-transform:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px}
.card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:14px;cursor:default;transition:border-color 0.12s}
.card:hover{border-color:#ccc}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.fav-icon{width:28px;height:28px;border-radius:6px;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#888;flex-shrink:0;overflow:hidden}
.fav-icon img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.card-meta{flex:1;min-width:0}
.card-title{display:block;font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;text-decoration:none;cursor:pointer}
.card-title:hover{text-decoration:underline}
a.fav-icon{cursor:pointer}
.card-domain{font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.card-btns{display:flex;gap:2px;flex-shrink:0}
.ic-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#ccc;font-size:15px;transition:background 0.12s;line-height:1}
.ic-btn:hover{background:#f0f0ec;color:#666}
.ic-btn.on{color:#e9a13a}
.card-memo{font-size:12px;color:#888;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;align-items:center;gap:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#f0f0ec;color:#888;border:1px solid #e8e8e5}
.ext-link{margin-left:auto;font-size:11px;color:#bbb;text-decoration:none;display:flex;align-items:center;gap:2px}
.ext-link:hover{color:#888}
.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-state .big{font-size:36px;margin-bottom:10px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:420px;max-width:94vw;border:1px solid #e8e8e5}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid #e0e0da;border-radius:8px;background:#f8f8f6;color:#1a1a1a;font-size:13px;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#bbb;background:#fff}
.field textarea{resize:vertical;min-height:68px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit;transition:background 0.12s}
.btn:hover{background:#f0f0ec}
.btn.solid{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.solid:hover{opacity:0.8}
.btn.del{color:#c0392b;border-color:#f5c6c6;margin-right:auto}
.btn.del:hover{background:#fff0ee}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">🔖 북마크</div>
    <div class="cat-list" id="catList"></div>
    <div class="add-cat-area">
      <div class="add-cat-btn" id="addCatBtn">＋ 카테고리 추가</div>
      <div class="cat-input-row" id="catRow">
        <input type="text" id="catInput" placeholder="이름 입력">
        <button id="catOk">추가</button>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="q" placeholder="제목, URL, 메모 검색...">
      </div>
      <button class="btn-new" id="btnNew">＋ 북마크 추가</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn on" data-f="all">전체</button>
      <button class="filter-btn" data-f="starred">⭐ 즐겨찾기</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="mTitle">북마크 추가</div>
    <div class="field"><label>제목</label><input id="fTitle" placeholder="사이트 이름"></div>
    <div class="field"><label>URL</label><input id="fUrl" type="url" placeholder="https://..."></div>
    <div class="field"><label>카테고리</label><select id="fCat"></select></div>
    <div class="field"><label>메모 (선택)</label><textarea id="fMemo" placeholder="간단한 메모..."></textarea></div>
    <div class="modal-foot">
      <button class="btn del" id="btnDel" style="display:none">삭제</button>
      <button class="btn" id="btnCancel">취소</button>
      <button class="btn solid" id="btnSave">저장</button>
    </div>
  </div>
</div>

<script>
const KEY = 'bm_v2';
const DEFAULT = {
  cats: ['업무','학습','참고자료','AI 도구'],
  bms: [],
  active: 'all',
  filter: 'all',
  eid: null,
  nid: 1
};
let S = JSON.parse(JSON.stringify(DEFAULT));

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) S = Object.assign(JSON.parse(JSON.stringify(DEFAULT)), JSON.parse(raw));
  } catch(e) {}
}
function save() {
  try {
    const {cats, bms, nid} = S;
    localStorage.setItem(KEY, JSON.stringify({cats, bms, nid}));
  } catch(e) {}
}

function normUrl(url) { url=(url||'').trim(); if(url && !/^https?:\/\//i.test(url)) url='https://'+url; return url; }
function domain(url) { try { return new URL(url).hostname.replace('www.',''); } catch(e){return '';} }
function favUrl(url) { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch(e){return '';} }
function initial(t) { return (t||'?')[0].toUpperCase(); }

function renderSidebar() {
  const total = S.bms.length;
  const stars = S.bms.filter(b=>b.star).length;
  let h = `
    <div class="cat-item${S.active==='all'?' active':''}" data-c="all">📋 전체<span class="cat-count">${total}</span></div>
    <div class="cat-item${S.active==='starred'?' active':''}" data-c="starred">⭐ 즐겨찾기<span class="cat-count">${stars}</span></div>
    <div class="cat-divider"></div>`;
  S.cats.forEach(c => {
    const n = S.bms.filter(b=>b.cat===c).length;
    h += `<div class="cat-item${S.active===c?' active':''}" data-c="${c}" style="position:relative">
      📁 ${c}<span class="cat-count">${n}</span>
      <button class="cat-del-btn" data-dc="${c}" title="삭제" style="display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:transparent;cursor:pointer;color:#ccc;font-size:13px;padding:0 2px;line-height:1">✕</button>
    </div>`;
  });
  document.getElementById('catList').innerHTML = h;
  document.querySelectorAll('.cat-item').forEach(el => {
    el.onclick = () => { S.active = el.dataset.c; renderSidebar(); renderContent(); };
    el.onmouseenter = () => { const b=el.querySelector('.cat-del-btn'); if(b) b.style.display='block'; };
    el.onmouseleave = () => { const b=el.querySelector('.cat-del-btn'); if(b) b.style.display='none'; };
  });
  document.querySelectorAll('.cat-del-btn').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const c = btn.dataset.dc;
      const n = S.bms.filter(b=>b.cat===c).length;
      const msg = n > 0 ? `'${c}' 카테고리를 삭제하면 해당 북마크 ${n}개가 '기타'로 이동됩니다.\n삭제하시겠습니까?` : `'${c}' 카테고리를 삭제하시겠습니까?`;
      if (!confirm(msg)) return;
      if (n > 0) S.bms.filter(b=>b.cat===c).forEach(b=>b.cat='기타');
      S.cats = S.cats.filter(x=>x!==c);
      if (S.active === c) S.active = 'all';
      save(); renderSidebar(); renderContent();
    };
  });
}

function getList() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  let list = S.bms;
  if (S.active === 'starred') list = list.filter(b=>b.star);
  else if (S.active !== 'all') list = list.filter(b=>b.cat===S.active);
  if (S.filter === 'starred') list = list.filter(b=>b.star);
  if (q) list = list.filter(b=>(b.title+b.url+b.memo).toLowerCase().includes(q));
  return list;
}

function renderContent() {
  const list = getList();
  const el = document.getElementById('content');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="big">🔖</div>북마크가 없습니다</div>`;
    return;
  }
  const grouped = {};
  if (S.active==='all'||S.active==='starred') {
    S.cats.forEach(c => { const g=list.filter(b=>b.cat===c); if(g.length) grouped[c]=g; });
    const etc = list.filter(b=>!S.cats.includes(b.cat));
    if (etc.length) grouped['기타'] = etc;
  } else {
    grouped[S.active] = list;
  }
  let h = '';
  Object.entries(grouped).forEach(([cat, items]) => {
    h += `<div class="sec-label">${cat} (${items.length})</div><div class="grid">`;
    items.forEach(b => {
      const href = normUrl(b.url);
      const fav = favUrl(href);
      h += `<div class="card">
        <div class="card-top">
          <a class="fav-icon" href="${href}" target="_blank" rel="noopener"><img src="${fav}" onerror="this.parentNode.textContent='${initial(b.title)}'"></a>
          <div class="card-meta">
            <a class="card-title" href="${href}" target="_blank" rel="noopener" title="${b.title}">${b.title}</a>
            <div class="card-domain">${domain(href)}</div>
          </div>
          <div class="card-btns">
            <button class="ic-btn${b.star?' on':''}" data-sid="${b.id}" title="즐겨찾기">${b.star?'⭐':'☆'}</button>
            <button class="ic-btn" data-eid="${b.id}" title="편집">✏️</button>
          </div>
        </div>
        ${b.memo?`<div class="card-memo">${b.memo}</div>`:''}
        <div class="card-foot">
          <span class="badge">${b.cat}</span>
          <a class="ext-link" href="${href}" target="_blank" rel="noopener">↗ 열기</a>
        </div>
      </div>`;
    });
    h += '</div>';
  });
  el.innerHTML = h;
  el.querySelectorAll('[data-sid]').forEach(btn => {
    btn.onclick = () => { const b=S.bms.find(x=>x.id===+btn.dataset.sid); if(b){b.star=!b.star;save();renderSidebar();renderContent();} };
  });
  el.querySelectorAll('[data-eid]').forEach(btn => {
    btn.onclick = () => openEdit(+btn.dataset.eid);
  });
}

function fillCatSelect(sel) {
  document.getElementById('fCat').innerHTML = S.cats.map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');
}

function openEdit(id) {
  const b = S.bms.find(x=>x.id===id);
  if (!b) return;
  S.eid = id;
  document.getElementById('mTitle').textContent = '북마크 편집';
  document.getElementById('fTitle').value = b.title;
  document.getElementById('fUrl').value = b.url;
  document.getElementById('fMemo').value = b.memo||'';
  fillCatSelect(b.cat);
  document.getElementById('btnDel').style.display = 'block';
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('btnNew').onclick = () => {
  S.eid = null;
  document.getElementById('mTitle').textContent = '북마크 추가';
  ['fTitle','fUrl','fMemo'].forEach(id=>document.getElementById(id).value='');
  fillCatSelect(S.cats.includes(S.active)?S.active:S.cats[0]);
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
};

document.getElementById('btnCancel').onclick = () => document.getElementById('overlay').classList.remove('show');
document.getElementById('overlay').onclick = e => { if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('show'); };

document.getElementById('btnSave').onclick = () => {
  const title = document.getElementById('fTitle').value.trim();
  const url = normUrl(document.getElementById('fUrl').value);
  if (!title||!url) { alert('제목과 URL을 입력해주세요.'); return; }
  const cat = document.getElementById('fCat').value;
  const memo = document.getElementById('fMemo').value.trim();
  if (S.eid) {
    const b = S.bms.find(x=>x.id===S.eid);
    if (b) Object.assign(b,{title,url,cat,memo});
  } else {
    S.bms.unshift({id:S.nid++,title,url,cat,memo,star:false});
  }
  save(); document.getElementById('overlay').classList.remove('show');
  renderSidebar(); renderContent();
};

document.getElementById('btnDel').onclick = () => {
  if (!confirm('삭제하시겠습니까?')) return;
  S.bms = S.bms.filter(b=>b.id!==S.eid);
  save(); document.getElementById('overlay').classList.remove('show');
  renderSidebar(); renderContent();
};

document.getElementById('q').oninput = renderContent;

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    S.filter = btn.dataset.f;
    renderContent();
  };
});

document.getElementById('addCatBtn').onclick = () => {
  const r = document.getElementById('catRow');
  r.style.display = r.style.display==='flex'?'none':'flex';
  if (r.style.display==='flex') document.getElementById('catInput').focus();
};

function addCat() {
  const v = document.getElementById('catInput').value.trim();
  if (v && !S.cats.includes(v)) { S.cats.push(v); save(); renderSidebar(); }
  document.getElementById('catInput').value = '';
  document.getElementById('catRow').style.display = 'none';
}
document.getElementById('catOk').onclick = addCat;
document.getElementById('catInput').onkeydown = e => { if(e.key==='Enter') addCat(); if(e.key==='Escape') document.getElementById('catRow').style.display='none'; };

(()=>{ load(); renderSidebar(); renderContent(); })();
</script>
</body>
</html>
